name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Compile all Python files
        run: python3 -m py_compile $(find swarm -name '*.py')

      - name: Check core imports
        run: |
          python3 -c "from swarm import run_swarm; print('core import ok')"
          python3 -c "from swarm.tui import run_tui; print('tui import ok')"

      - name: Run tool smoke tests (skip swarm)
        run: python3 test_tools.py --skip-swarm

      - name: Run unittest suite
        run: python3 -m unittest discover -v tests/

      - name: Run pytest suite
        run: pytest tests/ -v
